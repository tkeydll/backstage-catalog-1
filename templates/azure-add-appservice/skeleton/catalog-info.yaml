apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: azure-${{ values.environmentName }}-appservice-${{ values.workloadName }}
  description: Azure app service add-on for existing environment ${{ values.environmentName }}
  annotations:
    github.com/project-slug: ${{ values.destination.owner }}/${{ values.destination.repo }}
spec:
  type: infrastructure
  owner: ${{ values.owner }}
  lifecycle: experimental
