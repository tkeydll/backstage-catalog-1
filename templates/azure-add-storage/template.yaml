apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-add-storage-existing-environment
  title: Azure Add Storage to Existing Environment
  description: Scaffold storage Bicep add-on files for an existing shared environment/resource group
  tags:
    - azure
    - bicep
    - infrastructure
    - storage
spec:
  owner: group:default/platform-team
  type: infrastructure

  parameters:
    - title: Add-on Details
      required:
        - environmentName
        - workloadName
        - storageAccountName
        - location
        - resourceGroupName
      properties:
        environmentName:
          type: string
          title: Existing Environment Name
          pattern: '^[-a-z0-9]{2,30}$'
        workloadName:
          type: string
          title: Add-on Workload Name
          description: Folder name under addons/storage
          pattern: '^[-a-z0-9]{2,30}$'
        storageAccountName:
          type: string
          title: Storage Account Name
          pattern: '^[a-z0-9]{3,24}$'
        location:
          type: string
          title: Azure Region
          default: japaneast
          enum:
            - japaneast
            - eastus
            - westeurope
        resourceGroupName:
          type: string
          title: Existing Resource Group Name
        owner:
          type: string
          title: Catalog Owner
          default: group:default/platform-team

    - title: Repository Details
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetchAddon
      name: Scaffold storage add-on files
      action: fetch:template
      input:
        url: ./skeleton
        values:
          environmentName: ${{ parameters.environmentName }}
          workloadName: ${{ parameters.workloadName }}
          storageAccountName: ${{ parameters.storageAccountName }}
          location: ${{ parameters.location }}
          resourceGroupName: ${{ parameters.resourceGroupName }}
          owner: ${{ parameters.owner }}
          destination: ${{ parameters.repoUrl | parseRepoUrl }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        description: Azure storage add-on for ${{ parameters.environmentName }}
        allowedHosts:
          - github.com

    - id: register
      name: Register catalog entity
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Catalog
        entityRef: ${{ steps.register.output.entityRef }}
